name: Lumina Tests

on:
  push:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'paimon-python/**'
      - '.github/workflows/paimon-python-checks.yml'
      - 'paimon-core/src/test/java/org/apache/paimon/JavaPyE2ETest.java'
  workflow_dispatch:

env:
  JDK_VERSION: 8
  MAVEN_OPTS: -Dmaven.wagon.httpconnectionManager.ttlSeconds=30 -Dmaven.wagon.http.retryHandler.requestSentEnabled=true

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  lumina_test:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout paimon-cpp (Lumina library)
        uses: actions/checkout@v6
        with:
          repository: alibaba/paimon-cpp
          ref: release-0.1
          path: paimon-cpp
          lfs: true

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: 'temurin'

      - name: Install GCC 9 and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-9 g++-9 patchelf

      - name: Install CMake 3.30.1
        run: |
          wget -q https://github.com/Kitware/CMake/releases/download/v3.30.1/cmake-3.30.1-linux-x86_64.tar.gz
          tar xzf cmake-3.30.1-linux-x86_64.tar.gz
          echo "${{ github.workspace }}/cmake-3.30.1-linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build Lumina JNI native library
        run: |
          export CC=gcc-9
          export CXX=g++-9
          export LUMINA_ROOT=${{ github.workspace }}/paimon-cpp/third_party/lumina
          chmod +x paimon-lumina/paimon-lumina-jni/scripts/build-native.sh
          paimon-lumina/paimon-lumina-jni/scripts/build-native.sh
          rm -rf paimon-lumina/paimon-lumina-jni/src/main/native/build
          rm -rf ${{ github.workspace }}/paimon-cpp
          rm -rf cmake-3.30.1-linux-x86_64

      - name: Install paimon-lumina-jni
        run: |
          mvn -B -ntp -f paimon-lumina/paimon-lumina-jni/pom.xml install -DskipTests \
            -Dcheckstyle.skip -Dspotless.check.skip -Denforcer.skip

      - name: Build Paimon
        run: mvn -T 2C -B -ntp clean install -DskipTests -Pflink1,spark3,paimon-lumina

      - name: Test paimon-lumina-jni
        run: |
          mvn -B -ntp test \
            -pl paimon-lumina/paimon-lumina-jni \
            -Dcheckstyle.skip -Dspotless.check.skip -Denforcer.skip

      - name: Test paimon-lumina-index
        timeout-minutes: 30
        run: |
          mvn -B -ntp test \
            -pl paimon-lumina/paimon-lumina-index \
            -Ppaimon-lumina \
            -Dcheckstyle.skip -Dspotless.check.skip -Denforcer.skip
        env:
          MAVEN_OPTS: -Xmx4096m

      - name: Test paimon-lumina-e2e
        timeout-minutes: 30
        run: |
          mvn -B -ntp test \
            -pl paimon-lumina/paimon-lumina-e2e-test \
            -Ppaimon-lumina,spark3 \
            -Dcheckstyle.skip -Dspotless.check.skip -Denforcer.skip
        env:
          MAVEN_OPTS: -Xmx4096m
