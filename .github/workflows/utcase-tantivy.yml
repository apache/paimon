name: UTCase Tantivy

on:
  push:
    paths:
      - 'paimon-tantivy/**'
      - 'pom.xml'
      - '.github/workflows/utcase-tantivy.yml'
  pull_request:
    paths:
      - 'paimon-tantivy/**'
      - 'pom.xml'
      - '.github/workflows/utcase-tantivy.yml'

env:
  JDK_VERSION: 8
  MAVEN_OPTS: -Dmaven.wagon.httpconnectionManager.ttlSeconds=30 -Dmaven.wagon.http.retryHandler.requestSentEnabled=true

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  tantivy_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout paimon-full-text
        uses: actions/checkout@v6
        with:
          repository: apache/paimon-full-text
          path: paimon-full-text

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: 'temurin'

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build paimon-full-text native libraries
        run: |
          cd paimon-full-text
          cargo build --release -p paimon-ftindex-jni -p paimon-ftindex-ffi
          echo "PAIMON_FTINDEX_JNI_LIB_PATH=${GITHUB_WORKSPACE}/paimon-full-text/target/release/libpaimon_ftindex_jni.so" >> $GITHUB_ENV
          echo "PAIMON_FTINDEX_LIB_PATH=${GITHUB_WORKSPACE}/paimon-full-text/target/release/libpaimon_ftindex_ffi.so" >> $GITHUB_ENV

      - name: Install paimon-full-text Java dependency
        run: |
          mvn -B -ntp -f paimon-full-text/java/pom.xml install -DskipTests

      - name: Build and test Tantivy modules
        timeout-minutes: 30
        run: |
          mvn -T 2C -B -ntp clean install -DskipTests
          mvn -B -ntp verify -pl paimon-tantivy/paimon-tantivy-index -Dcheckstyle.skip=true -Dspotless.check.skip=true
        env:
          MAVEN_OPTS: -Xmx4096m
